<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- background gradient: deep navy with subtle warm glow -->
    <radialGradient id="bg" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0%" stop-color="#1d2542"/>
      <stop offset="60%" stop-color="#0e1320"/>
      <stop offset="100%" stop-color="#070a14"/>
    </radialGradient>

    <!-- soft pink glow behind number -->
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.4">
      <stop offset="0%" stop-color="#ff9ec0" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#ff6b9d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0"/>
    </radialGradient>

    <!-- gold gradient for the number -->
    <linearGradient id="gold" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="45%" stop-color="#ffc857"/>
      <stop offset="100%" stop-color="#e89a2a"/>
    </linearGradient>

    <!-- gold rim/decoration -->
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd97a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff9ec0" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>

  <!-- soft pink-gold halo -->
  <circle cx="512" cy="460" r="380" fill="url(#glow)"/>

  <!-- decorative ring (soft, elegant) -->
  <circle cx="512" cy="510" r="370" stroke="url(#rim)" stroke-width="3" fill="none" opacity="0.4"/>
  <circle cx="512" cy="510" r="350" stroke="url(#rim)" stroke-width="1.5" fill="none" opacity="0.25"/>

  <!-- The number "65" — gold, bold, centered -->
  <text x="512" y="640"
        font-family="'Nunito', 'SF Pro Rounded', -apple-system, sans-serif"
        font-size="500"
        font-weight="900"
        fill="url(#gold)"
        text-anchor="middle"
        letter-spacing="-15">65</text>

  <!-- tiny gold sparkle dots (decoration) -->
  <circle cx="270" cy="280" r="6" fill="#ffd97a" opacity="0.7"/>
  <circle cx="760" cy="320" r="5" fill="#ff9ec0" opacity="0.65"/>
  <circle cx="220" cy="720" r="4" fill="#a78bfa" opacity="0.55"/>
  <circle cx="800" cy="760" r="7" fill="#ffd97a" opacity="0.6"/>
  <circle cx="310" cy="180" r="3" fill="#ffe9a8" opacity="0.7"/>
  <circle cx="710" cy="850" r="4" fill="#ff9ec0" opacity="0.5"/>

  <!-- tiny "kg" label below -->
  <text x="512" y="820"
        font-family="'Nunito', sans-serif"
        font-size="80"
        font-weight="800"
        fill="#ff9ec0"
        text-anchor="middle"
        opacity="0.75"
        letter-spacing="8">kg</text>
</svg>
